services:
  admin-backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: always
    container_name: admin-backend
    environment:
      APP_ENV: production
      FORWARDED_ALLOW_IPS: "*"
      # Path inside the container; backend/app/routers/backup.py reads this.
      # The host-side cron writes backups to ./backups (mounted below).
      BACKUP_DIR: /app/backups
      # Maintenance-flag dir + deployment label (read by /api/system-health/actions/maintenance).
      MAINT_DIR: /app/maintenance
      DEPLOYMENT_LABEL: admin
    env_file: ./backend/.env.admin
    # The host's docker group GID (snap-docker on Server 2 uses 987). Required
    # so the appuser (uid 1000) inside the container can read /var/run/docker.sock.
    # If the host docker group GID changes, update this to match `stat -c %g
    # /var/run/docker.sock` on the host.
    group_add:
      - "987"
      # ssmspl-host-actions group GID — lets the backend write JSON request
      # files into /var/lib/ssmspl-host-actions/queue/ for the host-side daemon
      # to pick up. GID is host-specific (created by `groupadd --system`); on
      # Server 2 it landed at 986. Update if `getent group ssmspl-host-actions`
      # returns a different value. Without this, host-action endpoints stay
      # disabled (is_queue_mounted() returns false for write-blocked dir).
      - "986"
    volumes:
      # snap-docker on Server 2 cannot bind-mount paths outside /home, so
      # backups live at /home/ssmspl-admin-backups (NOT ./backups). Host
      # cron writes pg_dump output here; /api/backup/* reads from /app/backups.
      - /home/ssmspl-admin-backups:/app/backups
      # Docker socket for SuperAdmin remote-control (restart container, logs,
      # stats). Read-only inside container — the docker SDK only needs RW for
      # writes, but we use it for restart/logs/inspect which work read-only on
      # most snap-docker setups. SUPER_ADMIN-only at the router gate.
      - /var/run/docker.sock:/var/run/docker.sock
      # Host-action queue: backend writes JSON requests, host-side daemon
      # picks them up and runs whitelisted privileged ops (kill -9, iptables
      # fix, etc.). The container path stays /var/lib/... so host_action_service
      # can find it; the host path is /home/... because snap-docker on Server 2
      # cannot bind-mount paths outside /home. If the dir doesn't exist on
      # host, the bind silently mounts an empty volume and is_queue_mounted()
      # returns false — endpoints stay safely disabled.
      - /home/ssmspl-host-actions:/var/lib/ssmspl-host-actions
      # Release manifest dir — backend reads <dir>/releases.json for /releases,
      # deploy script writes to it after each tagged build. Living outside the
      # image so rollback history survives container recreation. Mounted as
      # directory (not file) because docker auto-creates non-existent file
      # paths as directories, which would break the manifest read.
      - /home/ssmspl-admin-releases:/app/releases
      # Maintenance flags + HTML — RW so the backend can flip flags from the
      # /api/system-health/actions/maintenance endpoint. Same dir is read by
      # the host nginx (Server 2 uses host-installed nginx, not containerized).
      - /home/ssmspl-admin-maintenance:/app/maintenance:rw
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\""]
      interval: 30s
      timeout: 10s
      start_period: 15s
      retries: 3
    networks:
      - admin-net
    deploy:
      resources:
        limits:
          memory: 1024M

  admin-frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: https://admin.carferry.online
        NEXT_PUBLIC_APP_URL: https://admin.carferry.online
        NEXT_PUBLIC_APP_NAME: "SSMSPL Admin"
        NEXT_PUBLIC_ADMIN_PORTAL: "true"
        INTERNAL_API_URL: http://admin-backend:8000
    restart: always
    container_name: admin-frontend
    environment:
      NODE_ENV: production
      HOSTNAME: "0.0.0.0"
    ports:
      - "3010:3000"
    depends_on:
      admin-backend:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD-SHELL", "node -e \"const http = require('http'); http.get('http://localhost:3000/login', (r) => { process.exit(r.statusCode === 200 ? 0 : 1) }).on('error', () => process.exit(1))\""]
      interval: 30s
      timeout: 10s
      start_period: 20s
      retries: 3
    networks:
      - admin-net
    deploy:
      resources:
        limits:
          memory: 1024M

networks:
  admin-net:
    driver: bridge
