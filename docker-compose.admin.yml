services:
  admin-backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: always
    container_name: admin-backend
    environment:
      APP_ENV: production
      FORWARDED_ALLOW_IPS: "*"
      # Path inside the container; backend/app/routers/backup.py reads this.
      # The host-side cron writes backups to ./backups (mounted below).
      BACKUP_DIR: /app/backups
    env_file: ./backend/.env.admin
    volumes:
      # snap-docker on Server 2 cannot bind-mount paths outside /home, so
      # backups live at /home/ssmspl-admin-backups (NOT ./backups). Host
      # cron writes pg_dump output here; /api/backup/* reads from /app/backups.
      - /home/ssmspl-admin-backups:/app/backups
      # Docker socket for SuperAdmin remote-control (restart container, logs,
      # stats). Read-only inside container — the docker SDK only needs RW for
      # writes, but we use it for restart/logs/inspect which work read-only on
      # most snap-docker setups. SUPER_ADMIN-only at the router gate.
      - /var/run/docker.sock:/var/run/docker.sock
      # Host-action queue: backend writes JSON requests, host-side daemon
      # picks them up and runs whitelisted privileged ops (kill -9, iptables
      # fix, etc.). If the dir doesn't exist on host, the bind silently
      # mounts an empty volume and host_action_service.is_queue_mounted()
      # returns false — endpoints stay safely disabled.
      - /var/lib/ssmspl-host-actions:/var/lib/ssmspl-host-actions
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\""]
      interval: 30s
      timeout: 10s
      start_period: 15s
      retries: 3
    networks:
      - admin-net
    deploy:
      resources:
        limits:
          memory: 1024M

  admin-frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: https://admin.carferry.online
        NEXT_PUBLIC_APP_URL: https://admin.carferry.online
        NEXT_PUBLIC_APP_NAME: "SSMSPL Admin"
        NEXT_PUBLIC_ADMIN_PORTAL: "true"
        INTERNAL_API_URL: http://admin-backend:8000
    restart: always
    container_name: admin-frontend
    environment:
      NODE_ENV: production
      HOSTNAME: "0.0.0.0"
    ports:
      - "3010:3000"
    depends_on:
      admin-backend:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD-SHELL", "node -e \"const http = require('http'); http.get('http://localhost:3000/login', (r) => { process.exit(r.statusCode === 200 ? 0 : 1) }).on('error', () => process.exit(1))\""]
      interval: 30s
      timeout: 10s
      start_period: 20s
      retries: 3
    networks:
      - admin-net
    deploy:
      resources:
        limits:
          memory: 1024M

networks:
  admin-net:
    driver: bridge
