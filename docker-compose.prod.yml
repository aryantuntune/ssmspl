version: "3.9"

services:
  db:
    image: postgres:16.6-alpine
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-ssmspl_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ssmspl_prod_pass}
      POSTGRES_DB: ${POSTGRES_DB:-ssmspl_db_prod}
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./backend/scripts/ddl.sql:/docker-entrypoint-initdb.d/01_ddl.sql
      - ./backend/scripts/seed_data.sql:/docker-entrypoint-initdb.d/02_seed.sql
    # No port exposure — only reachable internally
    # Kill idle connections after 10 min to prevent stale connection buildup
    command: >
      postgres
        -c idle_in_transaction_session_timeout=600000
        -c tcp_keepalives_idle=60
        -c tcp_keepalives_interval=10
        -c tcp_keepalives_count=6
        -c shared_buffers=256MB
        -c log_min_duration_statement=1000
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ssmspl_user} -d ${POSTGRES_DB:-ssmspl_db_prod}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal
    deploy:
      resources:
        limits:
          memory: 1G

  redis:
    image: redis:7.4-alpine
    restart: always
    command: redis-server --maxmemory 64mb --maxmemory-policy allkeys-lru --tcp-keepalive 60 --timeout 300 --requirepass ${REDIS_PASSWORD:-ssmspl_redis_prod}
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-ssmspl_redis_prod}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - internal
    deploy:
      resources:
        limits:
          memory: 96M

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: always
    environment:
      APP_ENV: production
      POSTGRES_USER: ${POSTGRES_USER:-ssmspl_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ssmspl_prod_pass}
      POSTGRES_DB: ${POSTGRES_DB:-ssmspl_db_prod}
      REDIS_URL: redis://:${REDIS_PASSWORD:-ssmspl_redis_prod}@redis:6379/0
      RATE_LIMIT_STORAGE_URI: redis://:${REDIS_PASSWORD:-ssmspl_redis_prod}@redis:6379/1
      FORWARDED_ALLOW_IPS: "*"  # Docker internal network only — nginx is the sole proxy
      # Maintenance-flag dir + deployment label (read by /api/system-health/actions/maintenance).
      MAINT_DIR: /app/maintenance
      DEPLOYMENT_LABEL: prod
    env_file: ./backend/.env.production
    # Two host groups must be granted to the backend (uid 1000):
    # - 988: docker group (Server 1) — read /var/run/docker.sock for the
    #   SuperAdmin remote-control endpoints. Match `stat -c %g
    #   /var/run/docker.sock` on the host if it differs.
    # - 986: ssmspl-host-actions — write JSON request files into
    #   /var/lib/ssmspl-host-actions/queue for the host-side daemon.
    #   Created by `groupadd --system ssmspl-host-actions` (run once via
    #   scripts/install_host_actions_server1.sh). Match `getent group
    #   ssmspl-host-actions | cut -d: -f3` if a fresh install lands on
    #   something other than 986.
    group_add:
      - "988"
      - "986"
    volumes:
      - ./backups:/app/backups
      # Docker socket — used by SuperAdmin remote-control endpoints
      # (restart container, logs, stats). SUPER_ADMIN-only at the router gate.
      - /var/run/docker.sock:/var/run/docker.sock
      # Host-action queue (optional; if the dir doesn't exist on host,
      # host_action_service.is_queue_mounted() returns false and the /host
      # endpoint stays disabled).
      - /var/lib/ssmspl-host-actions:/var/lib/ssmspl-host-actions
      # Release manifest dir — survives container recreation, written by deploy
      # script, read by /api/system-health/actions/releases. Mounted as a
      # directory so docker doesn't auto-create the manifest path as a dir.
      - /var/lib/ssmspl-releases:/app/releases
      # Maintenance flags + HTML — RW so backend can toggle flags via
      # /api/system-health/actions/maintenance. Same dir nginx reads from
      # (mounted at /usr/share/nginx/maintenance:ro on the nginx container).
      - ./nginx/maintenance:/app/maintenance:rw
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\""]
      interval: 30s
      timeout: 10s
      start_period: 15s
      retries: 3
    networks:
      - internal
    deploy:
      resources:
        limits:
          memory: 1G

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: https://api.carferry.online
        NEXT_PUBLIC_APP_URL: https://carferry.online
        NEXT_PUBLIC_APP_NAME: SSMSPL
        INTERNAL_API_URL: http://backend:8000
    restart: always
    environment:
      NODE_ENV: production
      HOSTNAME: "0.0.0.0"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "node -e \"const http = require('http'); http.get('http://localhost:3000', (r) => { process.exit(r.statusCode === 200 ? 0 : 1) }).on('error', () => process.exit(1))\""]
      interval: 30s
      timeout: 10s
      start_period: 20s
      retries: 3
    networks:
      - internal
    deploy:
      resources:
        limits:
          memory: 512M

  nginx:
    image: nginx:1.27-alpine
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./nginx/maintenance:/usr/share/nginx/maintenance:ro
      - ./certbot/www:/var/www/certbot:ro
      - ./certbot/conf:/etc/letsencrypt:ro
    # No depends_on — nginx starts immediately and serves maintenance pages
    # while backend/frontend come up. This prevents 502 errors during startup.
    networks:
      - internal
    deploy:
      resources:
        limits:
          memory: 256M

  db-backup:
    image: postgres:16.6-alpine
    restart: always
    entrypoint: >
      /bin/sh -c '
      echo "Backup scheduler started — daily at 2:00 AM + manual trigger support";
      chmod 1777 /backups 2>/dev/null || true;
      while true; do
        if [ -f /backups/.trigger ]; then
          rm -f /backups/.trigger;
          echo "[$(date)] Manual backup triggered via UI";
          if /scripts/backup_db.sh; then
            touch /backups/.sync_needed;
            echo "[$(date)] Marked .sync_needed for GDrive sync";
          fi;
          sleep 5;
          continue;
        fi;
        HOUR=$(date +%H);
        MINUTE=$(date +%M);
        TODAY=$(date +%Y%m%d);
        if [ "$$HOUR" = "02" ] && [ "$$MINUTE" -lt 5 ] && [ ! -f "/backups/.schedule_done_$${TODAY}" ]; then
          echo "[$(date)] Scheduled backup time reached";
          if /scripts/backup_db.sh; then
            touch /backups/.sync_needed;
            echo "[$(date)] Marked .sync_needed for GDrive sync";
          fi;
          touch "/backups/.schedule_done_$${TODAY}";
          find /backups -name ".schedule_done_*" -mtime +1 -delete 2>/dev/null || true;
        fi;
        sleep 10;
      done'
    environment:
      TZ: IST-5:30
      POSTGRES_USER: ${POSTGRES_USER:-ssmspl_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ssmspl_prod_pass}
      POSTGRES_DB: ${POSTGRES_DB:-ssmspl_db_prod}
      PGHOST: db
      BACKUP_DIR: /backups
      RETENTION_DAYS: "7"
    volumes:
      - ./backend/scripts/backup_db.sh:/scripts/backup_db.sh:ro
      - ./backups:/backups
    depends_on:
      db:
        condition: service_healthy
    networks:
      - internal
    deploy:
      resources:
        limits:
          memory: 128M

  # Run once to get initial certs, then set up cron for renewal
  certbot:
    image: certbot/certbot
    volumes:
      - ./certbot/www:/var/www/certbot
      - ./certbot/conf:/etc/letsencrypt
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"
    networks:
      - internal

volumes:
  pg_data:

networks:
  internal:
    driver: bridge
